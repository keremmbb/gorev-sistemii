<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efsanevi Görevci - Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        /* Kayıt sayfasına özel ek stiller */
        .card {
            max-width: 400px;
            width: 90%;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.2);
        }
        .primary-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        .secondary-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body class="center">

<div class="card">
    <h2 style="color: #2d3748; margin-bottom: 10px;">🚀 Kayıt Ol</h2>
    <p style="color: #718096; margin-bottom: 25px;">Kayıt Türü: <b id="roleText" style="color: #4facfe;">Yükleniyor...</b></p>

    <div id="registration-form">
        <div class="form-group">
            <input type="text" id="name" placeholder="Adınız ve Soyadınız">
            <input type="email" id="email" placeholder="E-posta Adresiniz">
            <input type="password" id="password" placeholder="Şifreniz">
        </div>
        
        <button id="sendCodeBtn" onclick="sendCode()" class="primary-btn">
            Doğrulama Kodu Gönder
        </button>
    </div>

    <div id="verification-section" style="display: none;">
        <div style="background: #f0fff4; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #c6f6d5;">
            <p style="font-size: 13px; color: #276749; margin: 0;">
                Mail adresinize 6 haneli bir kod gönderdik. Lütfen aşağıya girin.
            </p>
        </div>
        
        <div class="form-group">
            <input type="text" id="vCode" placeholder="6 Haneli Kod" maxlength="6" 
                   style="text-align: center; font-size: 20px; letter-spacing: 5px; font-weight: bold;">
        </div>

        <button onclick="verifyAndRegister()" class="secondary-btn">
            Kaydı Tamamla ve Giriş Yap
        </button>
        
        <p style="margin-top: 15px;">
            <a href="javascript:void(0)" onclick="location.reload()" style="font-size: 12px; color: #a0aec0;">Bilgileri Değiştir / Tekrar Dene</a>
        </p>
    </div>

    <div style="margin-top: 25px; border-top: 1px solid #edf2f7; padding-top: 15px;">
        <a href="index.html" style="text-decoration: none; color: #4facfe; font-size: 14px; font-weight: 500;">
            ← Giriş Sayfasına Dön
        </a>
    </div>
</div>

<script>
    // URL'den rolü alıp ekrana yazdıran küçük script
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'student';
        const roleText = document.getElementById("roleText");
        
        if (role === 'parent') {
            roleText.innerText = "Veli";
            roleText.style.color = "#ed5e68"; // Veli için kırmızımsı ton
        } else {
            roleText.innerText = "Öğrenci";
            roleText.style.color = "#4facfe"; // Öğrenci için mavi ton
        }
    };
</script>

</body>
</html>
