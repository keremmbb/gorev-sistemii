<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="center">

<div class="card">
    <h2>Kayıt Ol</h2>
    <p>Kayıt Türü: <b id="roleText">Veli</b></p>
    <div id="registration-form">
    <input type="text" id="name" placeholder="Ad Soyad">
    <input type="email" id="email" placeholder="E-posta">
    <input type="password" id="password" placeholder="Şifre">
    
    <button onclick="sendCode()" style="background: #4facfe; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer;">
        Doğrulama Kodu Gönder
    </button>
</div>

<div id="verification-section" style="display: none; margin-top: 20px;">
    <input type="text" id="vCode" placeholder="6 Haneli Kod">
    <button onclick="verifyAndRegister()" style="background: #2ecc71; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer;">
        Kaydı Tamamla
    </button>
</div>

    <div class="input-group">
        <input type="email" id="email" placeholder="E-posta Adresiniz">
        <button id="sendCodeBtn" onclick="sendCode()">Doğrulama Kodunu Gönder</button>
    </div>

    <div id="verificationSection" style="margin-top: 15px;">
        <input type="text" id="code" placeholder="Mailinize Gelen Kod">
        <input type="password" id="password" placeholder="Yeni Şifreniz">
        <button onclick="verify()">Kodu Doğrula ve Kaydı Tamamla</button>
    </div>

    <p><a href="index.html" style="font-size: 0.8em; color: #666;">Giriş Sayfasına Dön</a></p>
</div>

</body>
</html>
