<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        /* Genel Durum ve Kart Stilleri */
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-select { border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; color: #4a5568; cursor: pointer; outline: none; transition: 0.3s; }
        .status-select:hover { border-color: #4facfe; }
        
        /* Market Kartları */
        .market-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f4f8; transition: 0.3s; }
        .market-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body style="background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px;">

    <div style="max-width: 1000px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
            <div>
                <h2 style="margin: 0; color: #2d3748;">Hoş Geldin, <span id="student-name">...</span>! 👋</h2>
                <p style="margin: 5px 0 0; color: #718096; font-size: 0.9rem;">Bugün harika şeyler başarmaya hazır mısın?</p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="background: #ebf8ff; padding: 10px 20px; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.2rem;">💎</span>
                    <span id="student-points" style="font-weight: bold; color: #2b6cb0; font-size: 1.1rem;">0 GP</span>
                </div>
                <button onclick="showCart()" style="position: relative; background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s;">
                    🛒
                    <span id="cart-count" style="position: absolute; top: -5px; right: -5px; background: #f56565; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: bold;">0</span>
                </button>
                <button onclick="logout()" style="background: #fff5f5; color: #c53030; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s;">Çıkış Yap</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px;">
            <div>
                <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 25px;">
                    <h3 style="margin-top: 0; color: #2d3748; display: flex; align-items: center; gap: 10px;">🚀 Aktif Görevlerin</h3>
                    <ul id="taskList" style="list-style: none; padding: 0;"></ul>
                </div>

                <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                    <h3 style="margin-top: 0; color: #2d3748; display: flex; align-items: center; gap: 10px;">✅ Tamamlanan Görevler</h3>
                    <ul id="completedTaskList" style="list-style: none; padding: 0; opacity: 0.7;"></ul>
                </div>
            </div>

            <div>
                <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 25px;">
                    <h3 style="margin-top: 0; color: #2d3748; display: flex; align-items: center; gap: 10px;">🏪 Ödül Marketi</h3>
                    <div id="market-items-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        </div>
                </div>

                <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                    <h3 style="margin-top: 0; color: #2d3748; display: flex; align-items: center; gap: 10px;">🏅 Rozetlerin</h3>
                    <div id="badge-container" style="display: flex; flex-wrap: wrap; gap: 10px;">
                        </div>
                </div>
            </div>
        </div>

        <div id="cart-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
            <div style="background: white; width: 90%; max-width: 450px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden;">
                <div style="padding: 20px; background: #f8fafc; border-bottom: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin: 0; color: #2d3748;">🛒 Sepetim</h3>
                    <button onclick="closeCart()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #a0aec0;">&times;</button>
                </div>
                
                <div id="cart-items-list" style="max-height: 350px; overflow-y: auto; padding: 10px;">
                    </div>

                <div style="padding: 20px; border-top: 1px solid #edf2f7;">
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; color: #2d3748; margin-bottom: 15px;">
                        <span>Toplam:</span>
                        <span id="cart-total-amount">0 GP</span>
                    </div>
                    
                    <button onclick="checkout()" id="final-checkout-btn" style="width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 12px rgba(72, 187, 120, 0.2); transition: 0.3s;">
                        ✅ Alışverişi Tamamla
                    </button>
                </div>
            </div>
        </div>

        <div id="confirm-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
            <div style="background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
                <div style="font-size: 3.5rem; margin-bottom: 15px;">🗑️</div>
                <h3 id="confirm-title" style="margin: 0 0 10px 0; color: #2d3748; font-size: 1.4rem;">Emin misiniz?</h3>
                <p id="confirm-text" style="color: #718096; margin-bottom: 25px; line-height: 1.5; font-size: 1rem;">Bu ürünü sepetten tamamen silmek istediğinize emin misiniz?</p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button id="confirm-cancel-btn" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; color: #4a5568; cursor: pointer; font-weight: bold; transition: 0.2s;">Vazgeç</button>
                    <button id="confirm-yes-btn" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #f56565; color: white; cursor: pointer; font-weight: bold; transition: 0.2s;">Evet, Sil</button>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
