<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyTasks(); loadStudentPoints();"> 
<script>
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");

    if (!userId || (role && role.toLowerCase() !== "student")) {
        window.location.href = "index.html";
    }

    function toggleArchive() {
        const list = document.getElementById("completedTaskList");
        const chevron = document.getElementById("archive-chevron");
        if (list.style.display === "none") {
            list.style.display = "block";
            chevron.innerText = "▲";
        } else {
            list.style.display = "none";
            chevron.innerText = "▼";
        }
    }
</script>

<div class="container" style="max-width: 600px; margin: 0 auto; padding: 20px; font-family: 'Segoe UI', sans-serif;">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3); display: inline-block; min-width: 320px;">
            <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.9;">Mevcut Seviye: <span id="user-level" style="font-weight: bold;">1</span></div>
            <div id="user-rank" style="font-size: 1.6rem; font-weight: bold; margin-bottom: 10px;">Çaylak Görevci</div>
            
            <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; display: flex; justify-content: space-around;">
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">TOPLAM TECRÜBE</div>
                    <div style="font-size: 1.2rem; font-weight: bold;">✨ <span id="total-xp-display">0</span> XP</div>
                </div>
                <div style="border-left: 1px solid rgba(255,255,255,0.3); height: 30px;"></div>
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">HARCANABİLİR</div>
                    <div style="font-size: 1.2rem; font-weight: bold;">💰 <span id="total-points">0</span> GP</div>
                </div>
            </div>
            <button onclick="toggleLevelTable()" style="background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;">📜 Rütbe Tablosu</button>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 25px; justify-content: center;">
        <button onclick="showSection('tasks')" id="btn-tasks" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #4facfe; color: white; cursor: pointer; font-weight: bold; transition: 0.3s;">📖 Görevlerim</button>
        <button onclick="showSection('market')" id="btn-market" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e2e8f0; color: #4a5568; cursor: pointer; font-weight: bold; transition: 0.3s;">🛒 Ödül Marketi</button>
    </div>

    <div id="section-tasks">
        <ul id="taskList" style="padding: 0; list-style: none;"></ul>

        <div id="section-archive" style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px;">
            <div onclick="toggleArchive()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0;">
                <span style="color: #64748b; font-size: 0.9rem; font-weight: 600;">🏆 Tamamlananlar (<span id="completed-count">0</span>)</span>
                <span id="archive-chevron">▼</span>
            </div>
            <ul id="completedTaskList" style="display: none; padding: 10px 0; list-style: none; margin-top: 10px;"></ul>
        </div>
    </div>

    <div id="section-market" style="display: none;">
        <h3 style="color: #2d3748; margin-bottom: 15px;">Ödül Marketi</h3>
        <div id="market-items-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div style="background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f4f8;">
                <div style="font-size: 2.5rem; margin-bottom: 10px;">💻</div>
                <strong style="display: block; font-size: 1rem; color: #2d3748;">+1 Saat Bilgisayar</strong>
                <div style="color: #2b6cb0; font-weight: 800; margin: 5px 0; font-size: 1.1rem;">200 GP</div>
                <button onclick="buyReward('+1 Saat Bilgisayar', 200)" style="width: 100%; margin-top: 10px; padding: 10px; border: none; background: #3182ce; color: white; border-radius: 8px; cursor: pointer; font-weight: bold;">Satın Al</button>
            </div>
            </div>
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <button onclick="logout()" style="background: none; color: #94a3b8; border: 1px solid #e2e8f0; padding: 8px 20px; border-radius: 10px; cursor: pointer; font-size: 0.8rem;">Güvenli Çıkış</button>
    </div>
</div>
</body>
</html>
