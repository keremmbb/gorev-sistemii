<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyTasks(); loadStudentPoints();"> <script>
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");

    // Eğer giriş yok veya öğrenci değilse ana sayfaya yönlendir
    if (!userId || (role && role.toLowerCase() !== "student")) {
        window.location.href = "index.html";
    }
</script>

<div class="container" style="max-width: 600px; margin: 0 auto; padding: 20px; font-family: sans-serif;">
    <h2 style="text-align: center; color: #333;">📖 Görevlerim</h2>

    <div style="text-align: center; margin-bottom: 25px;">
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: inline-block; min-width: 250px;">
        <div style="font-size: 0.8rem; text-transform: uppercase; opacity: 0.9;">SEVİYE <span id="user-level">1</span></div>
        <div id="user-rank" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">Çaylak Görevci</div>
        <div style="font-size: 1.3rem; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.2); paddingTop: 5px;">
            💰 Para: <span id="total-points">0</span> GP
        </div>
    </div>
</div>
    <ul id="taskList" style="padding: 0; list-style: none;">
        </ul>

    <div style="text-align: center; margin-top: 30px;">
        <button onclick="logout()" style="background-color: #ff4d4d; color: white; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;">
            Çıkış Yap
        </button>
    </div>
</div>

</body>
</html>
