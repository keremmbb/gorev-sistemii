<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Öğrenci Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyTasks(); loadStudentPoints(); loadRejectedPurchases(); loadMyBadges();">
<script>
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");

    if (!userId || (role && role.toLowerCase() !== "student")) {
        window.location.href = "index.html";
    }

    function toggleArchive() {
        const list = document.getElementById("completedTaskList");
        const chevron = document.getElementById("archive-chevron");
        if (list.style.display === "none") {
            list.style.display = "block";
            chevron.innerText = "▲";
        } else {
            list.style.display = "none";
            chevron.innerText = "▼";
        }
    }

    function toggleLevelTable() {
        const table = document.getElementById("levelTable");
        const currentXp = document.getElementById("total-xp-display")?.innerText || "0";
        if(document.getElementById("current-xp-info")) document.getElementById("current-xp-info").innerText = currentXp;

        if (table.style.display === "none" || table.style.display === "") {
            table.style.display = "block";
            table.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
            table.style.display = "none";
        }
    }
</script>

<style>
    .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .status-select { border: 1px solid #e2e8f0; padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; color: #4a5568; cursor: pointer; outline: none; transition: 0.3s; }
    .status-select:hover { border-color: #4facfe; }
    .market-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f0f4f8; transition: 0.3s; }
    .market-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    
    .badge-item {
        text-align: center; 
        background: #f0f7ff; 
        padding: 10px; 
        border-radius: 12px; 
        border: 2px solid #4facfe; 
        min-width: 80px; 
        transition: transform 0.3s ease;
    }
    .badge-item:hover { transform: scale(1.1); }
</style>

<div class="container" style="max-width: 600px; margin: 0 auto; padding: 20px; font-family: 'Segoe UI', sans-serif;">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3); display: inline-block; width: 100%; box-sizing: border-box;">
            <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.9;">Mevcut Seviye: <span id="user-level" style="font-weight: bold;">1</span></div>
            <div id="user-rank" style="font-size: 1.6rem; font-weight: bold; margin-bottom: 10px;">Çaylak Görevci</div>
            
            <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; display: flex; justify-content: space-around;">
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">TOPLAM TECRÜBE</div>
                    <div style="font-size: 1.2rem; font-weight: bold;">✨ <span id="total-xp-display">0</span> XP</div>
                </div>
                <div style="border-left: 1px solid rgba(255,255,255,0.3); height: 30px;"></div>
                <div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">HARCANABİLİR</div>
                    <div style="font-size: 1.2rem; font-weight: bold;">💰 <span id="total-points">0</span> GP</div>
                </div>
            </div>
            <button onclick="toggleLevelTable()" style="background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; margin-top: 10px; font-weight: bold;">📜 Rütbe Tablosunu Gör</button>

            <div id="levelTable" style="display: none; margin-top: 15px; background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; color: #333;">
                <h4 style="margin-top: 0; color: #2d3748; border-bottom: 2px solid #f0f4f8; padding-bottom: 10px; text-align: center;">🏆 Rütbe Gereksinimleri</h4>
                <table style="width: 100%; font-size: 0.95rem; text-align: left; border-collapse: collapse;">
                    <tbody>
                        <tr style="border-bottom: 1px solid #f7fafc;"> <td style="padding: 12px 5px;">0 - 500 XP</td> <td style="text-align: right; font-weight: bold; color: #718096;">⚪ Çaylak</td> </tr>
                        <tr style="border-bottom: 1px solid #f7fafc;"> <td style="padding: 12px 5px;">501 - 1500 XP</td> <td style="text-align: right; font-weight: bold; color: #3182ce;">🔵 Asistan</td> </tr>
                        <tr style="border-bottom: 1px solid #f7fafc;"> <td style="padding: 12px 5px;">1501 - 3000 XP</td> <td style="text-align: right; font-weight: bold; color: #805ad5;">🟣 Usta</td> </tr>
                        <tr style="border-bottom: 1px solid #f7fafc;"> <td style="padding: 12px 5px;">3001 - 6000 XP</td> <td style="text-align: right; font-weight: bold; color: #38a169;">🟢 Kahraman</td> </tr>
                        <tr> <td style="padding: 12px 5px;">6000+ XP</td> <td style="text-align: right; font-weight: bold; color: #d69e2e;">👑 Efsane</td> </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #edf2f7;">
        <h3 style="margin-top: 0; color: #2d3748; font-size: 1rem; margin-bottom: 15px;">🏅 Başarımlarım</h3>
        <div id="badge-container" style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;"></div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 25px;">
        <button onclick="showSection('tasks')" id="btn-tasks" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #4facfe; color: white; cursor: pointer; font-weight: bold;">📖 Görevlerim</button>
        <button onclick="showSection('market')" id="btn-market" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e2e8f0; color: #4a5568; cursor: pointer; font-weight: bold;">🛒 Market</button>
    </div>

    <div id="section-tasks">
        <div id="legendary-tasks-section" style="margin-bottom: 25px; display: none; background: #fffcf0; padding: 15px; border-radius: 15px; border: 2px solid #f6ad55;">
            <h3 style="color: #b7791f; font-size: 1rem; margin-top: 0;">✨ Efsanevi Görevler</h3>
            <ul id="legendaryTaskList" style="padding: 0; list-style: none;"></ul>
        </div>

        <h3 style="color: #4a5568; font-size: 0.9rem;">📋 Günlük İşler</h3>
        <ul id="taskList" style="padding: 0; list-style: none;"></ul>

        <div id="section-archive" style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px;">
            <div onclick="toggleArchive()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #f8fafc; padding: 12px; border-radius: 10px;">
                <span style="color: #64748b; font-size: 0.9rem; font-weight: 600;">🏆 Tamamlananlar (<span id="completed-count">0</span>)</span>
                <span id="archive-chevron">▼</span>
            </div>
            <ul id="completedTaskList" style="display: none; padding: 0; list-style: none; margin-top: 10px;"></ul>
        </div>
    </div>

    <div id="section-market" style="display: none;">
        </div>

    <div style="text-align: center; margin-top: 60px; padding-bottom: 40px;">
        <button onclick="logout()" style="background-color: #ff4d4d; color: white; border: none; padding: 14px 40px; border-radius: 12px; cursor: pointer; font-weight: bold;">🚪 Çıkış Yap</button>
    </div>
</div>
</body>
</html>
