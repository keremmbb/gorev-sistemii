<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veli Dashboard - Efsanevi Görevci</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        /* Modern Input ve Genel Stiller */
        input:focus, textarea:focus { outline: none !important; border-color: #4facfe !important; }
        input, textarea { transition: border-color 0.2s ease; box-sizing: border-box !important; }
        .form-input { width: 100%; height: 42px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; display: block; margin-bottom: 10px; }
        
        .kanban-column {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            min-height: 450px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .kanban-column h4 {
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            color: #475569;
        }

        .status-count {
            background: #cbd5e1;
            color: #1e293b;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .kanban-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
            position: relative;
            transition: transform 0.2s;
        }

        .kanban-item:hover {
            transform: translateY(-2px);
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body onload="loadMyAssignedTasks()">

<div class="dashboard-container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="color: #1a202c;">👨‍👩‍👧‍ boy Veli Paneli</h2>
        <button onclick="logout()" style="background: #fc8181; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">Çıkış Yap</button>
    </div>

    <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px;">
        <h3 style="margin-bottom: 20px; color: #2d3748;">✨ Yeni Görev Ata</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="text" id="taskTitle" placeholder="Görev Başlığı (Örn: Kitap Oku)" class="form-input">
            <input type="email" id="assignedToEmail" placeholder="Öğrenci E-postası" class="form-input">
            <textarea id="taskDescription" placeholder="Görev Açıklaması..." class="form-input" style="grid-column: span 2; height: 80px;"></textarea>
            <input type="date" id="dueDate" class="form-input">
            <input type="time" id="dueTime" class="form-input">
        </div>
        <button onclick="addTask()" style="width: 100%; padding: 12px; background: #4facfe; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;">Görevi Tanımla</button>
    </div>

    <h3 style="margin-bottom: 20px; color: #2d3748;">📋 Görevlerin Durumu</h3>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
        
        <div class="kanban-column" style="border-top: 4px solid #94a3b8;">
            <h4>⏳ Başlamadı <span id="count-Baslamadi" class="status-count">0</span></h4>
            <div id="parent-list-Baslamadi"></div>
        </div>

        <div class="kanban-column" style="border-top: 4px solid #3b82f6;">
            <h4>🚀 Başlandı <span id="count-Baslandi" class="status-count">0</span></h4>
            <div id="parent-list-Baslandi"></div>
        </div>

        <div class="kanban-column" style="border-top: 4px solid #f59e0b;">
            <h4>🔄 Devam Ediyor <span id="count-DevamEdiyor" class="status-count">0</span></h4>
            <div id="parent-list-DevamEdiyor"></div>
        </div>

        <div class="kanban-column" style="border-top: 4px solid #22c55e;">
            <h4>✅ Tamamlandı <span id="count-Tamamlandı" class="status-count">0</span></h4>
            <div id="parent-list-Tamamlandı"></div>
        </div>

    </div>

    <div style="margin-top: 40px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h3 style="text-align: center; color: #2d3748; margin-bottom: 20px;">📊 Öğrenci Gelişim Analizi</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
            <input type="email" id="statsSearchEmail" placeholder="Öğrenci e-postası..." class="form-input" style="width: 250px; margin-bottom: 0;">
            <button onclick="loadStatsByEmail()" style="background: #4facfe; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Görüntüle</button>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <canvas id="myChart" style="width:100%; max-height:300px;"></canvas>
    </div>

</div>

</body>
</html>
