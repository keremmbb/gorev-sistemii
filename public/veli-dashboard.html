<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Veli Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyAssignedTasks()">

<script>
    if (!localStorage.getItem("userId") || localStorage.getItem("role") !== "parent") {
        window.location.href = "index.html";
    }
</script>

<div class="container">
    <h2 style="color: white; text-align: center; margin-bottom: 25px;">👨‍👩‍👧‍👦 Veli Kontrol Paneli</h2>

    <div class="section" style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; color: #333;">📝 Görev Ata</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="taskTitle" placeholder="Görev başlığı" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <textarea id="taskDescription" placeholder="Görev detayları (Opsiyonel)" rows="2" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: none; font-family: inherit;"></textarea>
            <input type="email" id="assignedToEmail" placeholder="Öğrenci maili" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <input type="date" id="dueDate" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <button onclick="addTask()" style="background: #667eea; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Görevi Tanımla</button>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div style="display: flex; gap: 10px;">
            <input type="email" id="inviteEmail" placeholder="Davet maili" style="flex: 3; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
            <button onclick="sendInvite()" style="flex: 1; background: #2d3748; color: white; border: none; border-radius: 8px; cursor: pointer;">Davet Et</button>
        </div>
    </div>

    <div class="kanban-board" style="display: flex; gap: 15px; overflow-x: auto; padding: 15px; margin-top: 20px;">
        <div class="column" style="flex: 1; min-width: 250px; background: #fff; border-top: 5px solid #ed5e68; padding: 10px; border-radius: 8px;">
            <h3>🔴 Başlamadı <span id="count-Baslamadi">0</span></h3>
            <div id="parent-list-Baslamadi"></div>
        </div>
        <div class="column" style="flex: 1; min-width: 250px; background: #fff; border-top: 5px solid #3498db; padding: 10px; border-radius: 8px;">
            <h3>🔵 Başlandı <span id="count-Baslandi">0</span></h3>
            <div id="parent-list-Baslandi"></div>
        </div>
        <div class="column" style="flex: 1; min-width: 250px; background: #fff; border-top: 5px solid #f1c40f; padding: 10px; border-radius: 8px;">
            <h3>🟡 Devam Ediyor <span id="count-DevamEdiyor">0</span></h3>
            <div id="parent-list-DevamEdiyor"></div>
        </div>
        <div class="column" style="flex: 1; min-width: 250px; background: #fff; border-top: 5px solid #2ecc71; padding: 10px; border-radius: 8px;">
            <h3>🟢 Tamamlandı <span id="count-Tamamlandi">0</span></h3>
            <div id="parent-list-Tamamlandi"></div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button onclick="logout()" style="background: #ff4d4d; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">Çıkış Yap</button>
    </div>
</div>
</body>
</html>
