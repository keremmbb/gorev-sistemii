<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Veli Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        /* Modern Input Odaklanma Efektleri */
        input:focus, textarea:focus { outline: none !important; border-color: #4facfe !important; }
        input, textarea { transition: border-color 0.2s ease; box-sizing: border-box !important; }
        .form-input { width: 100%; height: 42px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; display: block; }

        /* GRAFİK MODAL (AÇILIR PENCERE) STİLLERİ */
        #chart-modal {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Arkaplanı karartır */
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #666;
        }
    </style>
</head>
<body onload="loadMyAssignedTasks(); loadPendingPurchases();">

<script>
    const role = localStorage.getItem("role");
    const userId = localStorage.getItem("userId");
    if (!userId || (role && role.toLowerCase() !== "parent")) {
        window.location.href = "index.html";
    }
</script>

<div class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <h2 style="color: white; text-align: center; margin-bottom: 25px; font-family: 'Segoe UI', sans-serif;">👨‍👩‍👧‍👦 Veli Kontrol Paneli</h2>

    <div style="text-align: center; margin-bottom: 30px;">
        <button onclick="openChartModal()" 
                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;">
            📊 Gelişim Tablosunu Görüntüle
        </button>
    </div>

    <div class="section" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 30px auto;">
        <h3 style="margin-top:0; color: #2d3748; text-align: center;">📝 Yeni Görev Tanımla</h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" id="taskTitle" placeholder="Görev başlığı" class="form-input">
            <textarea id="taskDescription" placeholder="Görev detayları..." class="form-input" style="height: 80px; resize: none;"></textarea>
            <input type="email" id="assignedToEmail" placeholder="Öğrenci e-postası" class="form-input">
            <div style="display: flex; gap: 10px;">
                <input type="date" id="dueDate" class="form-input" style="flex: 1;">
                <input type="time" id="dueTime" class="form-input" style="flex: 1;">
            </div>
            <button onclick="addTask()" style="background: #4facfe; color: white; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">🚀 Görevi Gönder</button>
        </div>
    </div>

    <div id="purchase-panel" style="background: #edf2f7; padding: 20px; border-radius: 15px; margin-bottom: 25px; border-left: 6px solid #4a5568;">
        <h3 style="margin: 0; color: #2d3748;">🛒 Market Onay Bekleyenler</h3>
        <div id="pending-purchases-list"></div>
    </div>

    <div class="kanban-board" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
        <div class="column" style="background: #f8fafc; padding: 15px; border-radius: 15px; border-top: 5px solid #ed5e68;">
            <h3 style="color: #b91c1c;">🔴 Başlamadı <span id="count-Baslamadi">0</span></h3>
            <div id="parent-list-Baslamadi"></div>
        </div>
        <div class="column" style="background: #f8fafc; padding: 15px; border-radius: 15px; border-top: 5px solid #2ecc71;">
            <h3 style="color: #166534;">🟢 Tamamlandı <span id="count-Tamamlandi">0</span></h3>
            <div id="parent-list-Tamamlandi"></div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <button onclick="logout()" style="background: #ff4d4d; color: white; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">🚪 Çıkış Yap</button>
    </div>
</div>

<div id="chart-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeChartModal()">&times;</span>
        <h3 style="text-align: center; color: #2d3748;">📊 Öğrenci Gelişim Analizi</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
            <input type="email" id="statsSearchEmail" placeholder="Öğrenci e-postası..." style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 250px;">
            <button onclick="loadStatsByEmail()" style="background: #4facfe; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Sorgula</button>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <canvas id="myChart" style="width:100%; max-height:400px;"></canvas>
    </div>
</div>

<script>
    // Modal açma fonksiyonu
    function openChartModal() {
        document.getElementById('chart-modal').style.display = 'flex';
        // Eğer daha önce veri girilmişse otomatik yükle
        const lastEmail = document.getElementById('statsSearchEmail').value;
        if(lastEmail) loadStatsByEmail();
    }

    // Modal kapatma fonksiyonu
    function closeChartModal() {
        document.getElementById('chart-modal').style.display = 'none';
    }

    // Dışarı tıklayınca kapatma
    window.onclick = function(event) {
        const modal = document.getElementById('chart-modal');
        if (event.target == modal) {
            closeChartModal();
        }
    }
</script>

</body>
</html>
