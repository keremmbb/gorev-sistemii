<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Veli Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyAssignedTasks()">

<script>
    const role = localStorage.getItem("role");
    const userId = localStorage.getItem("userId");
    // Küçük harf kontrolü ekleyerek daha güvenli hale getirdik
    if (!userId || (role && role.toLowerCase() !== "parent")) {
        window.location.href = "index.html";
    }
</script>

<div class="container">
    <h2>Veli Dashboard</h2>

    <div class="section">
        <h3>📝 Öğrenciye Görev Ata</h3>
        <input type="text" id="taskTitle" placeholder="Görev başlığı">
        <input type="email" id="assignedToEmail" placeholder="Öğrenci maili">
        
        <div style="margin: 10px 0;">
            <label for="dueDate" style="display: block; font-size: 14px; margin-bottom: 5px;">Son Teslim Tarihi (Opsiyonel):</label>
            <input type="date" id="dueDate">
        </div>
        
        <button onclick="addTask()">Görev Ekle</button>
    </div>

    <hr>

    <div class="section">
        <h3>👥 Öğrenci Davet Et</h3>
        <input type="email" id="inviteEmail" placeholder="Öğrenci emaili">
        <button onclick="inviteStudent()">Davet Et</button>
        <p id="inviteMessage"></p>
    </div>

    <hr>

    <div class="kanban-board" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px; margin-top: 20px;">
    <div class="column" style="flex: 1; min-width: 250px; background: #f8d7da; padding: 10px; border-radius: 8px; border: 1px solid #f5c6cb;">
        <h3 style="text-align: center; color: #721c24;">🔴 Başlamadı</h3>
        <div id="parent-list-Baslamadi"></div>
    </div>

    <div class="column" style="flex: 1; min-width: 250px; background: #fff3cd; padding: 10px; border-radius: 8px; border: 1px solid #ffeeba;">
        <h3 style="text-align: center; color: #856404;">🔵 Başlandı</h3>
        <div id="parent-list-Baslandi"></div>
    </div>

    <div class="column" style="flex: 1; min-width: 250px; background: #d1ecf1; padding: 10px; border-radius: 8px; border: 1px solid #bee5eb;">
        <h3 style="text-align: center; color: #0c5460;">🟡 Devam Ediyor</h3>
        <div id="parent-list-DevamEdiyor"></div>
    </div>

    <div class="column" style="flex: 1; min-width: 250px; background: #d4edda; padding: 10px; border-radius: 8px; border: 1px solid #c3e6cb;">
        <h3 style="text-align: center; color: #155724;">🟢 Tamamlandı</h3>
        <div id="parent-list-Tamamlandi"></div>
    </div>
</div>

    <br>
    <button onclick="logout()" style="background-color: #ff4d4d; color: white;">Çıkış Yap</button>
</div>

</body>
</html>
