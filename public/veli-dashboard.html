<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Veli Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyAssignedTasks()">

<script>
    const role = localStorage.getItem("role");
    const userId = localStorage.getItem("userId");
    // Küçük harf kontrolü ekleyerek daha güvenli hale getirdik
    if (!userId || (role && role.toLowerCase() !== "parent")) {
        window.location.href = "index.html";
    }
</script>

<div class="container">
    <h2>Veli Dashboard</h2>

    <div class="section">
        <h3>📝 Öğrenciye Görev Ata</h3>
        <input type="text" id="taskTitle" placeholder="Görev başlığı">
        <input type="email" id="assignedToEmail" placeholder="Öğrenci maili">
        
        <div style="margin: 10px 0;">
            <label for="dueDate" style="display: block; font-size: 14px; margin-bottom: 5px;">Son Teslim Tarihi (Opsiyonel):</label>
            <input type="date" id="dueDate">
        </div>
        
        <button onclick="addTask()">Görev Ekle</button>
    </div>

    <hr>

    <div class="section">
        <h3>👥 Öğrenci Davet Et</h3>
        <input type="email" id="inviteEmail" placeholder="Öğrenci emaili">
        <button onclick="inviteStudent()">Davet Et</button>
        <p id="inviteMessage"></p>
    </div>

    <hr>

    <div class="kanban-board" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px; margin-top: 20px;">
    <div class="column" ...>
    <h3 style="text-align: center; color: #721c24;">
        🔴 Başlamadı <span id="count-Baslamadi" style="font-size: 0.8em; opacity: 0.7;">(0)</span>
    </h3>
    <div id="parent-list-Baslamadi"></div>
</div>

<div class="column" ...>
    <h3 style="text-align: center; color: #856404;">
        🔵 Başlandı <span id="count-Baslandi" style="font-size: 0.8em; opacity: 0.7;">(0)</span>
    </h3>
    <div id="parent-list-Baslandi"></div>
</div>

<div class="column" ...>
    <h3 style="text-align: center; color: #0c5460;">
        🟡 Devam Ediyor <span id="count-DevamEdiyor" style="font-size: 0.8em; opacity: 0.7;">(0)</span>
    </h3>
    <div id="parent-list-DevamEdiyor"></div>
</div>

<div class="column" ...>
    <h3 style="text-align: center; color: #155724;">
        🟢 Tamamlandı <span id="count-Tamamlandi" style="font-size: 0.8em; opacity: 0.7;">(0)</span>
    </h3>
    <div id="parent-list-Tamamlandi"></div>
</div>

    <br>
    <button onclick="logout()" style="background-color: #ff4d4d; color: white;">Çıkış Yap</button>
</div>

</body>
</html>
