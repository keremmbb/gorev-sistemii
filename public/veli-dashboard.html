<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Veli Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body onload="loadMyAssignedTasks()">

<script>
    const role = localStorage.getItem("role");
    const userId = localStorage.getItem("userId");
    // Küçük harf kontrolü ekleyerek daha güvenli hale getirdik
    if (!userId || (role && role.toLowerCase() !== "parent")) {
        window.location.href = "index.html";
    }
</script>

<div class="container">
    <h2>Veli Dashboard</h2>

    <div class="section">
        <h3>📝 Öğrenciye Görev Ata</h3>
        <input type="text" id="taskTitle" placeholder="Görev başlığı">
        <input type="email" id="assignedToEmail" placeholder="Öğrenci maili">
        
        <div style="margin: 10px 0;">
            <label for="dueDate" style="display: block; font-size: 14px; margin-bottom: 5px;">Son Teslim Tarihi (Opsiyonel):</label>
            <input type="date" id="dueDate">
        </div>
        
        <button onclick="addTask()">Görev Ekle</button>
    </div>

    <hr>

    <div class="section">
        <h3>👥 Öğrenci Davet Et</h3>
        <input type="email" id="inviteEmail" placeholder="Öğrenci emaili">
        <button onclick="inviteStudent()">Davet Et</button>
        <p id="inviteMessage"></p>
    </div>

    <hr>

    <div class="kanban-board" style="display: flex; gap: 15px; overflow-x: auto; padding: 15px; background: #f0f2f5;">
    
    <div class="column" style="flex: 1; min-width: 260px; background: #fff; border: 2px solid #ed5e68; padding: 15px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
        <h3 style="display: flex; justify-content: space-between; align-items: center; color: #721c24; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            🔴 Başlamadı <span id="count-Baslamadi" style="background: #ed5e68; color: white; padding: 2px 8px; border-radius: 10px; font-size: 14px;">0</span>
        </h3>
        <div id="parent-list-Baslamadi"></div>
    </div>

    <div class="column" style="flex: 1; min-width: 260px; background: #fff; border: 2px solid #3498db; padding: 15px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
        <h3 style="display: flex; justify-content: space-between; align-items: center; color: #1976d2; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            🔵 Başlandı <span id="count-Baslandi" style="background: #3498db; color: white; padding: 2px 8px; border-radius: 10px; font-size: 14px;">0</span>
        </h3>
        <div id="parent-list-Baslandi"></div>
    </div>

    <div class="column" style="flex: 1; min-width: 260px; background: #fff; border: 2px solid #f1c40f; padding: 15px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
        <h3 style="display: flex; justify-content: space-between; align-items: center; color: #856404; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            🟡 Devam Ediyor <span id="count-DevamEdiyor" style="background: #f1c40f; color: white; padding: 2px 8px; border-radius: 10px; font-size: 14px;">0</span>
        </h3>
        <div id="parent-list-DevamEdiyor"></div>
    </div>

    <div class="column" style="flex: 1; min-width: 260px; background: #fff; border: 2px solid #2ecc71; padding: 15px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);">
        <h3 style="display: flex; justify-content: space-between; align-items: center; color: #155724; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            🟢 Tamamlandı <span id="count-Tamamlandi" style="background: #2ecc71; color: white; padding: 2px 8px; border-radius: 10px; font-size: 14px;">0</span>
        </h3>
        <div id="parent-list-Tamamlandi"></div>
    </div>
</div>
    <br>
    <button onclick="logout()" style="background-color: #ff4d4d; color: white;">Çıkış Yap</button>
</div>

</body>
</html>
